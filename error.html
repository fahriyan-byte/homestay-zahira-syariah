<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homestay Salsabila Syariah — Halaman Tidak Ditemukan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #1d2e26 0%, #0f1a15 50%, #1a1815 100%);
      color: #faf8f1;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      padding: 24px;
    }

    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 520px;
      position: relative;
    }

    /* Decorative circles */
    .error-page::before,
    .error-page::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(250, 248, 241, 0.06);
      pointer-events: none;
    }

    .error-page::before {
      top: -30%;
      right: -20%;
      width: 280px;
      height: 280px;
      animation: float 20s ease-in-out infinite;
    }

    .error-page::after {
      bottom: -20%;
      left: -25%;
      width: 200px;
      height: 200px;
      border-color: rgba(250, 248, 241, 0.04);
      animation: float 26s ease-in-out 5s infinite reverse;
    }

    /* Brand icon */
    .error-icon {
      position: relative;
      width: 80px;
      height: 80px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(250, 248, 241, 0.15);
      border-radius: 50%;
      margin-bottom: 24px;
      animation: iconIn 800ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .error-icon span {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      color: #b9914b;
    }

    /* Status code */
    .error-code {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(4rem, 15vw, 7rem);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.06em;
      color: rgba(250, 248, 241, 0.08);
      margin-bottom: -8px;
      animation: fadeUp 700ms cubic-bezier(0.16, 1, 0.3, 1) 200ms both;
    }

    /* Divider line */
    .error-line {
      width: 60px;
      height: 2px;
      background: #b9914b;
      border-radius: 2px;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 500ms cubic-bezier(0.16, 1, 0.3, 1) 400ms forwards;
    }

    /* Heading */
    .error-heading {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.6rem, 4.5vw, 2.4rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 600ms cubic-bezier(0.16, 1, 0.3, 1) 500ms forwards;
    }

    /* Description */
    .error-desc {
      font-size: 14px;
      line-height: 1.6;
      color: rgba(250, 248, 241, 0.6);
      margin-bottom: 32px;
      max-width: 400px;
      opacity: 0;
      animation: fadeUp 600ms cubic-bezier(0.16, 1, 0.3, 1) 600ms forwards;
    }

    /* Button */
    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, #faf8f1 0%, #f0ebe0 100%);
      color: #25211c;
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
      text-decoration: none;
      transition: transform 180ms cubic-bezier(0.22, 1, 0.36, 1), box-shadow 280ms ease;
      opacity: 0;
      animation: fadeUp 600ms cubic-bezier(0.16, 1, 0.3, 1) 700ms forwards;
    }

    .error-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
    }

    .error-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Animated dots at bottom */
    .error-dots {
      display: flex;
      gap: 5px;
      margin-top: 40px;
      opacity: 0;
      animation: fadeUp 500ms 800ms forwards;
    }

    .error-dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(250, 248, 241, 0.2);
      animation: dot 1.4s ease-in-out infinite;
    }

    .error-dots span:nth-child(2) { animation-delay: 0.25s; }
    .error-dots span:nth-child(3) { animation-delay: 0.5s; }

    /* Keyframes */
    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(10px, -14px) rotate(2deg); }
      66% { transform: translate(-6px, 10px) rotate(-1deg); }
    }

    @keyframes iconIn {
      from {
        opacity: 0;
        transform: scale(0.6);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes dot {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    @media (max-width: 460px) {
      body { padding: 16px; }
      .error-icon { width: 64px; height: 64px; margin-bottom: 18px; }
      .error-icon span { font-size: 28px; }
      .error-desc { font-size: 13px; }
      .error-btn { width: 100%; justify-content: center; padding: 14px 20px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .error-icon { animation: none; opacity: 1; }
      .error-code, .error-line, .error-heading, .error-desc, .error-btn, .error-dots {
        opacity: 1;
        animation: none;
      }
      .error-page::before,
      .error-page::after { animation: none; }
      .error-dots span { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="error-page">
    <!-- Decorative circles via pseudo-elements -->

    <!-- Icon -->
    <div class="error-icon">
      <span>S</span>
    </div>

    <!-- Error code -->
    <p class="error-code">404</p>

    <!-- Gold line -->
    <div class="error-line"></div>

    <!-- Message -->
    <h1 class="error-heading">Halaman Tidak Ditemukan</h1>
    <p class="error-desc">
      Maaf, halaman yang Anda cari tidak tersedia atau telah dipindahkan.
      Silakan kembali ke beranda untuk melanjutkan penjelajahan.
    </p>

    <!-- Button -->
    <a class="error-btn" href="/homestay-zahira-syariah/">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Kembali ke Beranda
    </a>

    <!-- Dots -->
    <div class="error-dots">
      <span></span><span></span><span></span>
    </div>
  </main>
</body>
</html>
